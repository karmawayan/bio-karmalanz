<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient Neomorphic -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090514" />
      <stop offset="50%" stop-color="#0f0a26" />
      <stop offset="100%" stop-color="#05030a" />
    </linearGradient>
    
    <!-- Neon Cyber Gradient untuk Huruf Utama -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Efek Glow Menyala Khas DJ Platform -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Lingkaran Background 1:1 -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" />
  
  <!-- Aksen Lingkaran Gelombang Audio / Vinyl di Latar Belakang -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#2e1065" stroke-width="2" stroke-dasharray="10 15" opacity="0.4" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#4c1d95" stroke-width="1" opacity="0.3" />

  <!-- Simbol Grid Equalizer Musik Digital -->
  <g opacity="0.15">
    <rect x="180" y="380" width="12" height="40" rx="4" fill="#a855f7" />
    <rect x="205" y="360" width="12" height="60" rx="4" fill="#6366f1" />
    <rect x="230" y="340" width="12" height="80" rx="4" fill="#ec4899" />
    <rect x="256" y="350" width="12" height="70" rx="4" fill="#a855f7" />
    <rect x="282" y="370" width="12" height="50" rx="4" fill="#6366f1" />
    <rect x="307" y="390" width="12" height="30" rx="4" fill="#ec4899" />
  </g>

  <!-- Logo Huruf Monogram "KL" (Karma Lanz) Futuristik & Bold -->
  <g filter="url(#glow)">
    <text x="256" y="285" 
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
          font-size="145" 
          font-weight="900" 
          letter-spacing="-6"
          text-anchor="middle" 
          fill="url(#neonGrad)">
      KL
    </text>
  </g>

  <!-- Garis Neon Bawah Pembatas Minimalis -->
  <path d="M 190 315 L 322 315" stroke="url(#neonGrad)" stroke-width="5" stroke-linecap="round" filter="url(#glow)" />

  <!-- Teks Identitas Tambahan di Bagian Bawah -->
  <text x="256" y="450" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="14" 
        font-weight="800" 
        letter-spacing="8" 
        text-anchor="middle" 
        fill="#94a3b8" 
        opacity="0.8">
    DIGITAL PLATFORM
  </text>
</svg>